name: Build Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        
      - name: Debug project
        run: |
          pwd
          ls -la
          cat settings.gradle
          cat build.gradle | head -20
        
      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew tasks --all 2>&1 || true
          ./gradlew assembleDebug --info 2>&1 | tail -100
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: vitreos-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk